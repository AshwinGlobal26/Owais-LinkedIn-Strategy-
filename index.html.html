                  <div className="chip sans" style={{ background:`${CORAL}18`, color:CORAL, border:`1px solid ${CORAL}30` }}>✓ Ready to copy</div>
                </div>

                <div className="grid-3" style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:12, marginBottom:24 }}>
                  {[
                    { label:"Years Experience",   value:"12+",    sub:"PM & Programme",      color:CRIMSON },
                    { label:"Assets Managed p/y", value:"3,000+", sub:"Epic Games / Quixel", color:CORAL },
                    { label:"AI Tools in Use",    value:"3 + MCP",sub:"Claude · Gemini · GPT",color:GOLD },
                  ].map(m => (
                    <div key={m.label} className="metric-box">
                      <div style={{ fontSize:26, fontWeight:700, color:m.color, marginBottom:4, letterSpacing:"-0.02em" }}>{m.value}</div>
                      <div className="sans" style={{ fontSize:11, fontWeight:600, marginBottom:2, color:TEXT, letterSpacing:"0.06em", textTransform:"uppercase" }}>{m.label}</div>
                      <div className="sans" style={{ fontSize:10, color:MUTED }}>{m.sub}</div>
                    </div>
                  ))}
                </div>

                <div style={{ background:MID, border:`1px solid #3d2e4a`, borderRadius:4, overflow:"hidden" }}>
                  <div style={{ background:`linear-gradient(90deg,${CRIMSON}22,${CORAL}0d,transparent)`, padding:"14px 24px", borderBottom:"1px solid #3d2e4a", display:"flex", alignItems:"center", gap:12 }}>
                    <div style={{ width:28, height:28, borderRadius:2, background:`${CRIMSON}30`, display:"flex", alignItems:"center", justifyContent:"center" }}>
                      <DancerAccent style={{ width:18, height:26, opacity:0.8 }} />
                    </div>
                    <div className="sans" style={{ fontSize:10, color:MAUVE, letterSpacing:"0.14em", textTransform:"uppercase", fontWeight:600 }}>LinkedIn · About Section</div>
                  </div>
                  <div style={{ padding:"26px 28px", lineHeight:1.85, color:"#e8ddef", fontSize:15.5 }}>
                    {summary.split('\n\n').map((para, i) => <p key={i}>{para}</p>)}
                  </div>
                </div>

                <div style={{ marginTop:16, background:MID, borderRadius:4, padding:20, border:`1px solid #3d2e4a` }}>
                  <div className="sans" style={{ fontSize:11, fontWeight:700, color:GOLD, marginBottom:14, letterSpacing:"0.1em", textTransform:"uppercase" }}>Key Editorial Changes</div>
                  <div className="grid-2" style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                    {[
                      ["Led with infrastructure-building, not traits",     "Removed passive 'actively leverages' framing"],
                      ["MCP integration called out by name",                "Metrics preserved and embedded naturally"],
                      ["Ends on geographic scope for remote positioning",   "MENA + Europe context retained throughout"],
                    ].map(([after, before], i) => (
                      <div key={i} style={{ background:SURFACE, borderRadius:3, padding:12, border:`1px solid #3d2e4a` }}>
                        <div className="sans" style={{ fontSize:12, color:CORAL, marginBottom:4 }}>✓ {after}</div>
                        <div className="sans" style={{ fontSize:11, color:MUTED }}>↻ {before}</div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {/* ── STRATEGY ── */}
            {tab === "strategy" && (
              <div className="fade-in">
                <div style={{ marginBottom:22 }}>
                  <div style={{ fontSize:28, fontWeight:700, marginBottom:4 }}>2-Month LinkedIn Strategy</div>
                  <div className="sans" style={{ fontSize:12, color:MUTED }}>Networking-first · Engagement-led · Content as a relationship tool</div>
                </div>
                <div className="highlight">
                  <strong>Primary Goal:</strong> Build a warm network of 50–80 meaningful connections in games, tech, and AI-PM spaces — and be recognised as a credible voice in programme delivery and AI-augmented operations.
                </div>
                <div className="grid-2" style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14, marginTop:20 }}>
                  {strategy.map((s, i) => (
                    <div key={i} className="strategy-card" style={{ borderLeft:`3px solid ${s.accent}` }}>
                      <div style={{ fontSize:24, marginBottom:10 }}>{s.icon}</div>
                      <div className="sans" style={{ fontSize:14, fontWeight:700, marginBottom:14, color:TEXT }}>{s.title}</div>
                      <ul style={{ listStyle:"none", display:"flex", flexDirection:"column", gap:9 }}>
                        {s.items.map((item, j) => (
                          <li key={j} style={{ display:"flex", gap:8 }}>
                            <span style={{ color:s.accent, flexShrink:0, fontFamily:"'Jost',sans-serif", fontSize:13, marginTop:1 }}>→</span>
                            <span className="sans" style={{ fontSize:12.5, color:"#d4c8dc", lineHeight:1.55 }}>{item}</span>
                          </li>
                        ))}
                      </ul>
                    </div>
                  ))}
                </div>

                <div style={{ marginTop:18, background:MID, borderRadius:4, padding:22, border:`1px solid #3d2e4a` }}>
                  <div className="sans" style={{ fontSize:11, fontWeight:700, color:MAUVE, marginBottom:16, letterSpacing:"0.1em", textTransform:"uppercase" }}>Weekly Engagement Rhythm</div>
                  <div className="grid-5" style={{ display:"grid", gridTemplateColumns:"repeat(5,1fr)", gap:8 }}>
                    {[
                      { day:"Mon", action:"Post + comment on 5 posts from target personas" },
                      { day:"Tue", action:"Send 5–8 personalised connection requests" },
                      { day:"Wed", action:"LinkedIn groups + reply to all post comments" },
                      { day:"Thu", action:"Post + DM 2–3 people who recently engaged" },
                      { day:"Fri", action:"Review reach, reply to comments, log new connections" },
                    ].map(d => (
                      <div key={d.day} style={{ background:SURFACE, borderRadius:3, padding:14, border:`1px solid #3d2e4a`, borderTop:`2px solid ${CRIMSON}` }}>
                        <div className="sans" style={{ fontSize:12, fontWeight:700, color:CRIMSON, marginBottom:8, letterSpacing:"0.06em" }}>{d.day}</div>
                        <div className="sans" style={{ fontSize:11, color:MUTED, lineHeight:1.65 }}>{d.action}</div>
                      </div>
                    ))}
                  </div>
                </div>

                <div style={{ marginTop:14, background:MID, borderRadius:4, padding:22, border:`1px solid #3d2e4a` }}>
                  <div className="sans" style={{ fontSize:11, fontWeight:700, color:MAUVE, marginBottom:16, letterSpacing:"0.1em", textTransform:"uppercase" }}>2-Month Targets</div>
                  <div className="grid-4" style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:10 }}>
                    {[
                      { metric:"60–80",  label:"New meaningful connections", color:CRIMSON },
                      { metric:"16",     label:"Posts published",            color:CORAL },
                      { metric:"200+",   label:"Comments on others' posts",  color:MAUVE },
                      { metric:"5–10",   label:"Real DM conversations",      color:GOLD },
                    ].map(m => (
                      <div key={m.label} style={{ textAlign:"center", background:SURFACE, borderRadius:3, padding:16, border:`1px solid ${m.color}30`, borderTop:`2px solid ${m.color}` }}>
                        <div style={{ fontSize:26, fontWeight:700, color:m.color, marginBottom:6, letterSpacing:"-0.02em" }}>{m.metric}</div>
                        <div className="sans" style={{ fontSize:11, color:MUTED, lineHeight:1.5 }}>{m.label}</div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {/* ── CALENDAR ── */}
            {tab === "calendar" && (
              <div className="fade-in">
                <div style={{ marginBottom:20 }}>
                  <div style={{ fontSize:28, fontWeight:700, marginBottom:4 }}>Content Calendar</div>
                  <div className="sans" style={{ fontSize:12, color:MUTED }}>8 weeks · 2 posts per week · Each post paired with a daily engagement action</div>
                </div>

                <div style={{ display:"flex", flexWrap:"wrap", gap:8, marginBottom:20 }}>
                  {[
                    { label:"Systems & Infrastructure", color:CRIMSON },
                    { label:"AI in PM",                 color:CORAL },
                    { label:"Games Production",         color:MAUVE },
                    { label:"Career & Leadership",      color:GOLD },
                  ].map(p => (
                    <div key={p.label} className="chip sans" style={{ background:`${p.color}18`, color:p.color, border:`1px solid ${p.color}35` }}>
                      <span style={{ width:5, height:5, borderRadius:"50%", background:p.color, display:"inline-block" }} />
                      {p.label}
                    </div>
                  ))}
                </div>

                {[
                  { label:"Month 1", data:month1, prefix:"m1", accentColor:CRIMSON },
                  { label:"Month 2", data:month2, prefix:"m2", accentColor:CORAL },
                ].map(({ label, data, prefix, accentColor }) => (
                  <div key={prefix}>
                    <div style={{ display:"flex", alignItems:"center", gap:12, margin:"20px 0 10px" }}>
                      <div style={{ height:1, flex:1, background:`linear-gradient(90deg,${accentColor}50,transparent)` }} />
                      <div className="sans" style={{ fontSize:10, fontWeight:700, color:accentColor, letterSpacing:"0.14em", textTransform:"uppercase" }}>{label}</div>
                    </div>

                    {data.map((w, wi) => {
                      const key    = `${prefix}-${wi}`;
                      const isOpen = expandedWeek === key;
                      return (
                        <div key={wi} className="week-card">
                          <div className="week-header" onClick={() => setExpWeek(isOpen ? null : key)}>
                            <div style={{ display:"flex", alignItems:"center", gap:14 }}>
                              <div style={{ width:38, height:38, borderRadius:3, background:`${accentColor}18`, border:`1px solid ${accentColor}35`, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center" }}>
                                <span className="sans" style={{ fontSize:9, color:accentColor, fontWeight:700, letterSpacing:"0.06em", textTransform:"uppercase" }}>WK</span>
                                <span className="sans" style={{ fontSize:15, color:accentColor, fontWeight:700, lineHeight:1 }}>{wi + (prefix==="m2"?5:1)}</span>
                              </div>
                              <div>
                                <div className="sans" style={{ fontWeight:600, fontSize:13 }}>{w.week}</div>
                                <div className="sans" style={{ fontSize:11, color:MUTED, marginTop:2 }}>{w.theme}</div>
                              </div>
                            </div>
                            <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                              <div className="chip sans" style={{ background:"#2d2138", color:MUTED }}>{w.posts.length} posts</div>
                              <span className="sans" style={{ color:MUTED, fontSize:20, lineHeight:1 }}>{isOpen?"−":"+"}</span>
                            </div>
                          </div>

                          {isOpen && (
                            <div style={{ padding:"0 18px 18px" }}>
                              {w.posts.map((post, pi) => {
                                const pid        = `${prefix}-${wi}-${pi}`;
                                const pm         = pillars[post.pillar] || { color:MUTED, label:post.pillar };
                                const isExpanded = expandedPost === pid;
                                return (
                                  <div key={pi} className={`post-card${isExpanded?" open":""}`} onClick={() => setExpPost(isExpanded ? null : pid)}>
                                    <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                                      <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                                        <div style={{ width:30, height:30, borderRadius:2, background:`${pm.color}20`, border:`1px solid ${pm.color}35`, display:"flex", alignItems:"center", justifyContent:"center" }}>
                                          <span className="sans" style={{ fontSize:11, fontWeight:700, color:pm.color }}>{post.day.slice(0,2)}</span>
                                        </div>
                                        <div>
                                          <div className="sans" style={{ fontSize:13, fontWeight:600 }}>{post.type}</div>
                                          <div className="chip sans" style={{ background:`${pm.color}15`, color:pm.color, marginTop:5, border:`1px solid ${pm.color}25` }}>{pm.label}</div>
                                        </div>
                                      </div>
                                      <span className="sans" style={{ color:MUTED, fontSize:14 }}>{isExpanded?"▲":"▼"}</span>
                                    </div>

                                    {isExpanded && (
                                      <div style={{ marginTop:18, display:"flex", flexDirection:"column", gap:14 }}>
                                        <div>
                                          <div className="sans" style={{ fontSize:9, color:MUTED, fontWeight:700, marginBottom:8, letterSpacing:"0.14em", textTransform:"uppercase" }}>Opening Hook</div>
                                          <div style={{ fontSize:15, color:"#e8d5e0", fontStyle:"italic", lineHeight:1.7, borderLeft:`2px solid ${pm.color}`, paddingLeft:14 }}>"{post.hook}"</div>
                                        </div>
                                        <div>
                                          <div className="sans" style={{ fontSize:9, color:MUTED, fontWeight:700, marginBottom:8, letterSpacing:"0.14em", textTransform:"uppercase" }}>Format &amp; Structure</div>
                                          <div className="sans" style={{ fontSize:12.5, color:"#c4b8cc", lineHeight:1.65 }}>{post.format}</div>
                                        </div>
                                        <div style={{ background:`${CORAL}0d`, borderRadius:3, padding:13, border:`1px solid ${CORAL}25` }}>
                                          <div className="sans" style={{ fontSize:9, color:CORAL, fontWeight:700, marginBottom:6, letterSpacing:"0.14em", textTransform:"uppercase" }}>Paired Engagement Action</div>
                                          <div className="sans" style={{ fontSize:12.5, color:"#d4c0c4", lineHeight:1.65 }}>{post.engagement}</div>
                                        </div>
                                      </div>
                                    )}
                                  </div>
                                );
                              })}
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      );
    }

    // ── Mount ──────────────────────────────────────────────────
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
